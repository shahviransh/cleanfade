name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-tauri:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'release:app')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Arm based macs (M1 and above).
            target: "aarch64-apple-darwin"
            args: "--target aarch64-apple-darwin"
          - platform: 'macos-latest' # for Intel based macs.
            target: "x86_64-apple-darwin"
            args: '--target x86_64-apple-darwin'
          - platform: "ubuntu-22.04" # for Tauri v1 you could replace this with ubuntu-22.04.
            target: "x86_64-unknown-linux-gnu"
            args: ""
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install frontend dependencies
        run: npm ci

      - name: Install engine build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --noconsole --name cleanfade-engine --distpath src-tauri/bin --workpath .pybuild/work --specpath .pybuild/spec --collect-data faster_whisper --collect-submodules faster_whisper spotify_duck.py
          Copy-Item -Path src-tauri/bin/cleanfade-engine.exe -Destination src-tauri/bin/cleanfade-engine-${{ matrix.target }}.exe -Force

      - name: Build sidecar (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --name cleanfade-engine --distpath src-tauri/bin --workpath .pybuild/work --specpath .pybuild/spec --collect-data faster_whisper --collect-submodules faster_whisper spotify_duck.py
          cp src-tauri/bin/cleanfade-engine src-tauri/bin/cleanfade-engine-${{ matrix.target }}
          chmod +x src-tauri/bin/cleanfade-engine src-tauri/bin/cleanfade-engine-${{ matrix.target }}

      - name: Verify sidecar files
        shell: bash
        run: ls -la src-tauri/bin

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: cleanfade-v__VERSION__
          releaseName: CleanFade v__VERSION__
          releaseBody: See the assets to download and install this version.
          releaseDraft: false
          prerelease: false
          includeDebug: false
          includeRelease: true
          args: ${{ matrix.args }}
